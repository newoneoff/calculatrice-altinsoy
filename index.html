<head>
  <link rel="stylesheet" href="./css.css">
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculatrice</title>
  <link rel="icon" href="./logo.png" type="image/png">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1d4ed8">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</head>


<body>

<div class="calc-wrap">
  <div class="calc">
    <div class="screen" id="screen">0</div>
    <div class="grid">
      <button id="(" class="n">(</button>
      <button id=")" class="n">)</button>
      <button id="." class="n">.</button>
      <button id = "C" class="n">C</button>
      <button id="÷" class="n">÷</button>

      <button id="7" class="n">7</button>
      <button id="8" class="n">8</button>
      <button id="9" class="n">9</button>
      <button id="×" class="n">×</button>

      <button id="4" class="n">4</button>
      <button id="5" class="n">5</button>
      <button id="6" class="n">6</button>
      <button id="-" class="n">−</button>

      <button id="1" class="n">1</button>
      <button id="2" class="n">2</button>
      <button id="3" class="n">3</button>
      <button id="+" class="n">+</button>

      <button id="0" class="n" style="grid-column:span 3">0</button>
      <button id="entrer" class="n" style="grid-column:span 1; font-size:11px;">=</button>
    </div>
  </div>
</div>
<script src="./js.js"></script>
</body>
